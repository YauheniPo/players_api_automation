name: Kotlin tests runner CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate required secrets
        run: |
          missing=()
          [[ -z "$BASE_URL" ]]       && missing+=("BASE_URL")
          [[ -z "$ADMIN_LOGIN" ]]    && missing+=("ADMIN_LOGIN")
          [[ -z "$ADMIN_PASSWORD" ]] && missing+=("ADMIN_PASSWORD")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: The following repository secrets are not set: ${missing[*]}"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "All required secrets are present."
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ADMIN_LOGIN: ${{ secrets.ADMIN_LOGIN }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Run tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ADMIN_LOGIN: ${{ secrets.ADMIN_LOGIN }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: ./gradlew test

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: build/allure-results/
          retention-days: 7

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test/
          retention-days: 7

